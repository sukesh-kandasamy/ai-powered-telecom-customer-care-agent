<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule Interview</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f4; }
        .container { background-color: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 0 10px rgba(0, 0, 0, 0.1); max-width: 500px; margin: auto; }
        h1 { text-align: center; color: #333; }
        label { display: block; margin-bottom: 8px; font-weight: bold; }
        input[type="text"], input[type="tel"], input[type="date"], input[type="time"], input[type="file"] {
            width: calc(100% - 22px); /* Account for padding and border */
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        input[type="submit"] {
            background-color: #007bff;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
        }
        input[type="submit"]:hover {
            background-color: #0056b3;
        }
        .message { margin-top: 20px; padding: 10px; border-radius: 4px; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Schedule AI Interview</h1>
        <form action="/schedule-interview" method="post" enctype="multipart/form-data">
            <label for="candidate_name">Candidate Name:</label>
            <input type="text" id="candidate_name" name="candidate_name" required>

            <label for="role">Role Applying For:</label>
            <input type="text" id="role" name="role" required>

            <label for="phone_number">Candidate Phone Number (E.164 format, e.g., +15551234567):</label>
            <input type="tel" id="phone_number" name="phone_number" value="+919600944093" required>

            <label for="schedule_date">Schedule Date:</label>
            <input type="date" id="schedule_date" name="schedule_date" required>

            <label for="schedule_time">Schedule Time:</label>
            <input type="time" id="schedule_time" name="schedule_time" required>

            <label for="resume">Upload Resume (.txt or .pdf):</label>
            <input type="file" id="resume" name="resume" accept=".txt, .pdf" required>

            <input type="submit" value="Schedule Interview">
        </form>
    </div>
</body>
</html>
